<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Phishing Detection Suite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            padding: 0;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: #38bdf8;
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .card p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🛡️ AEGIS</h1>
        <p class="subtitle">Advanced Phishing & Smishing Detection Suite</p>

        <div class="grid">
            <a href="/phishing" class="card">
                <span class="icon">🔐</span>
                <h2>URL Phishing</h2>
                <p>Analyze website URLs using advanced machine learning and SHAP explainability to detect phishing
                    attempts.</p>
            </a>

            <a href="/smishing" class="card">
                <span class="icon">💬</span>
                <h2>SMS Smishing</h2>
                <p>Check SMS messages to identify fraudulent texts and social engineering attacks.</p>
            </a>
        </div>
    </div>

</body>

</html>
