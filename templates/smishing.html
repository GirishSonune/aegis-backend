<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smishing Detection</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 5rem;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 2rem;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            line-height: 1.2;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            background-color: #334155;
            border: 1px solid #4f4f56;
            border-radius: 0.5rem;
            color: #fafafa;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
        }

        button {
            background-color: #38bdf8;
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .result {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-align: center;
            font-size: 1.2rem;
        }

        .smishing {
            background-color: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .not-smishing {
            background-color: rgba(22, 163, 74, 0.2);
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .nav-link {
            color: #38bdf8;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div style="width: 100%; max-width: 700px;">
        <a href="/" class="nav-link">← Back to Home</a>

        <div class="container">
            <h1>💬 Smishing Detection</h1>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 20px;">Check SMS messages for phishing attempts
            </p>

            <form action="/smishing_ui" method="POST">
                <label>Enter the message</label>
                <textarea name="message" required
                    placeholder="Type the suspicious message here...">{{ message if message else '' }}</textarea>
                <button type="submit">Analyze Message</button>
            </form>

            {% if result is defined %}
            <div class="result {% if result == 'Smishing' %}smishing{% else %}not-smishing{% endif %}">
                Prediction: {{ result }}
            </div>
            {% endif %}
        </div>
    </div>
</body>

</html>
